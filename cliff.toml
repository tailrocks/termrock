[changelog]
header = """
# Changelog

All notable changes are grouped from Conventional Commits. Breaking releases
link their detailed consumer work from [`MIGRATING.md`](MIGRATING.md).

"""
body = """
{% if version -%}
## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}
{% set breaking = commits | filter(attribute="breaking", value=true) -%}
{% if breaking | length > 0 %}
### Breaking changes

{% for commit in breaking -%}
- {{ commit.message | split(pat="\n") | first | upper_first | trim }}
{% endfor %}
{% endif -%}
{% set compatible = commits | filter(attribute="breaking", value=false) -%}
{% for group, commits in compatible | group_by(attribute="group") %}
### {{ group }}

{% for commit in commits -%}
- {{ commit.message | split(pat="\n") | first | upper_first | trim }}
{% endfor %}
{% endfor %}
"""
footer = """
{% for release in releases -%}
{% if release.version -%}
{% if release.previous.version -%}
[{{ release.version }}]: https://github.com/tailrocks/termrock/compare/{{ release.previous.version }}..{{ release.version }}
{% else -%}
[{{ release.version }}]: https://github.com/tailrocks/termrock/tree/{{ release.version }}
{% endif -%}
{% else -%}
[Unreleased]: https://github.com/tailrocks/termrock/compare/{{ release.previous.version }}..HEAD
{% endif -%}
{% endfor %}
<!-- generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
filter_commits = false
protect_breaking_commits = true
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
sort_commits = "oldest"
commit_parsers = [
  { message = "^chore\\(merge\\)", skip = true },
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^ci", group = "Continuous integration" },
  { message = "^build", group = "Build" },
  { message = "^chore", group = "Maintenance" },
  { message = "^spike", group = "Experiments" },
  { message = "^revert", group = "Reverted" },
  { message = ".*", group = "Other" },
]
