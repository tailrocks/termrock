name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        required: true
        type: string
      lanes:
        description: velnor (default) | github | both
        type: choice
        default: velnor
        options: [velnor, github, both]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.config.lane }})
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "false"
      SCCACHE_CACHE_SIZE: 20G
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Required to create and push the release tag.
          fetch-depth: 0 # required to create and push the release tag
          persist-credentials: ${{ matrix.config.writer }}
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      - id: sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: v0.16.0
          disable_annotations: "false"
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache Cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/registry/src
            ~/.cargo/git/db
          key: cargo-registry-${{ matrix.config.lane }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'docs/bun.lock') }}
          restore-keys: |
            cargo-registry-${{ matrix.config.lane }}-${{ runner.os }}-
      - name: Cache Cargo target
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: target
          key: cargo-target-${{ matrix.config.lane }}-${{ runner.os }}-${{ github.job }}-${{ hashFiles('rust-toolchain.toml', '.cargo/config.toml', '**/Cargo.toml', '**/Cargo.lock') }}-${{ github.sha }}
          restore-keys: cargo-target-${{ matrix.config.lane }}-${{ runner.os }}-${{ github.job }}-${{ hashFiles('rust-toolchain.toml', '.cargo/config.toml', '**/Cargo.toml', '**/Cargo.lock') }}-
      - run: test "v$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="termrock") | .version')" = "${{ inputs.tag }}"
      - run: cargo nextest run --workspace --all-features --locked
      - run: cargo package -p termrock --locked
      - working-directory: docs
        run: bun install --frozen-lockfile && bun run build
      - name: Build release notes
        run: |
          mise x -- git-cliff --unreleased --tag "${{ inputs.tag }}" --strip all --output /tmp/cliff-notes.md
          set -- migrations/*-"${{ inputs.tag }}"-*.md
          if [ -e "$1" ]; then
            {
              echo '## Migration guides'
              echo
              for file in "$@"; do
                name=${file#migrations/}
                echo "- [$name](https://github.com/tailrocks/termrock/blob/main/$file)"
              done
              echo
              cat /tmp/cliff-notes.md
            } > /tmp/notes.md
          else
            cp /tmp/cliff-notes.md /tmp/notes.md
          fi
      - if: matrix.config.writer
        run: git tag -a "${{ inputs.tag }}" -m "TermRock ${{ inputs.tag }}"
      - if: matrix.config.writer
        run: git push origin "${{ inputs.tag }}"
      - if: matrix.config.writer
        env:
          GH_TOKEN: "${{ github.token }}"
        run: gh release create "${{ inputs.tag }}" --notes-file /tmp/notes.md
