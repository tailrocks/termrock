name: Docs
on: [push, pull_request]
permissions: { contents: read }
jobs:
  docs-required:
    permissions:
      contents: read
      pages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with: { install: false }
      - run: mise install rust
      - run: rustup toolchain install nightly --profile minimal
      - uses: Swatinem/rust-cache@v2
      - run: mise install bun
      - run: mise install cargo-binstall cargo:cargo-public-api
      - working-directory: docs
        run: bun install --frozen-lockfile
      - working-directory: docs
        run: bun run types:check
      - run: |
          mise x -- cargo public-api -p termrock --all-features > /tmp/public-api-fresh.txt
          diff -u docs/api/public-api.txt /tmp/public-api-fresh.txt
      - working-directory: docs
        run: bun run build
      - run: cargo run -p termrock-lookbook -- check --dir docs/public/component-previews
      - run: rm -rf target/render-a target/render-b
      - run: cargo run -p termrock-lookbook -- render --out target/render-a >/dev/null
      - run: cargo run -p termrock-lookbook -- render --out target/render-b >/dev/null
      - run: diff -r target/render-a target/render-b
      - run: cargo run -p termrock-lookbook -- render --theme slate --out target/render-slate >/dev/null
      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/configure-pages@v6
      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/dist/client

  deploy-pages:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: docs-required
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
